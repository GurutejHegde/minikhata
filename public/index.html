<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniKhata — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">₹</span>
      <h1>MiniKhata</h1>
      <p>Digital Ledger for Small Shops</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
      </div>
      <div id="loginError" class="error-msg hidden">Invalid username or password.</div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login</button>
    </form>

    <p class="login-hint">Default: <b>admin</b> / <b>1234</b></p>
  </div>

  <script>
    // If already logged in, go to dashboard
    fetch('/api/auth/me', { credentials: 'include' })
      .then(r => r.json())
      .then(d => { if (d.loggedIn) window.location.href = '/pages/dashboard.html'; })
      .catch(() => {});

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      err.classList.add('hidden');
      btn.textContent = 'Logging in...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method:      'POST',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/pages/dashboard.html';
        } else {
          err.classList.remove('hidden');
          btn.textContent = 'Login';
          btn.disabled = false;
        }
      } catch {
        err.textContent = 'Cannot connect to server. Is it running?';
        err.classList.remove('hidden');
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
